name: Build Browser Base Image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Chromium / 폰트 패키지 구성을 바꾸면 v2, v3 식으로 올려 새 태그를 발행한다.
  BROWSER_BASE_TAG: browser-base-bookworm-arm64-v1

jobs:
  build-browser-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.BROWSER_BASE_TAG }}
            type=raw,value=${{ env.BROWSER_BASE_TAG }}-${{ github.sha }}

      - name: Build and push browser base image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: browser-base
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=browser-base
          cache-to: type=gha,mode=max,scope=browser-base
