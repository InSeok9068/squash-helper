name: Build and Push Docker Image

on:
  push:
    branches: [release]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Chromium / 폰트 패키지 구성을 바꾸면 browser-base workflow와 함께 버전을 올린다.
  BROWSER_BASE_TAG: browser-base-bookworm-arm64-v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=release
            type=sha

      - name: Resolve browser base image
        id: browser_base
        shell: bash
        run: |
          base_image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BROWSER_BASE_TAG }}"

          if docker buildx imagetools inspect "$base_image" >/dev/null 2>&1; then
            echo "base_image=$base_image" >> "$GITHUB_OUTPUT"
          else
            echo "base_image=browser-base" >> "$GITHUB_OUTPUT"
            echo "Browser base image not found, falling back to local browser-base stage for this build."
          fi

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BROWSER_BASE_IMAGE=${{ steps.browser_base.outputs.base_image }}
          # 🔽 BuildKit 캐시 (레이어/마운트 포함) 실행 간 재사용
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Restart Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_ID }}
          key: ${{ secrets.REMOTE_SSH_KEY }}
          port: 22
          script: |
            cd ./Docker-Compose
            docker compose pull squash-helper
            docker compose up -d squash-helper

      # 커밋 메시지 준비 (텔레그램 메시지 길이 제한 해결)
      - name: Prepare Commit Message
        id: prep_commit
        run: echo "commit_message=$(echo "${{ github.event.head_commit.message }}" | head -n 1 | cut -c -200)" >> $GITHUB_OUTPUT

      # 빌드 성공 메세지 발송
      - name: Send Build Success Message
        uses: appleboy/telegram-action@master
        if: success()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            Status: 😚 **Success**

            Branch: ${{ github.ref_name }}

            Commit message: ${{ steps.prep_commit.outputs.commit_message }}

            [See changes](https://github.com/${{ github.repository }}/commit/${{github.sha}})

      # 빌드 실패 메세지 발송
      - name: Send Build Failure Message
        uses: appleboy/telegram-action@master
        if: failure()
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            Status: 😱 **Failure**

            Branch: ${{ github.ref_name }}

            Commit message: ${{ steps.prep_commit.outputs.commit_message }}

            [link](https://github.com/${{ github.repository }}/actions)
